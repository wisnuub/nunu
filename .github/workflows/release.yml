name: Release

on:
  push:
    tags:
      - 'alpha-v*'
      - 'v*'

jobs:
  build-mac:
    name: Build macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── AVM: build dependencies
      - name: Install AVM build deps
        run: brew install cmake ninja sdl2 sdl2_ttf molten-vk

      # ── AVM: configure + build
      - name: Build AVM (C++)
        run: |
          cmake -B native/avm/build -S native/avm -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DAVM_ENABLE_HVF=ON \
            -DAVM_ENABLE_MOLTENVK=ON \
            -DAVM_ENABLE_KVM=OFF \
            -DAVM_ENABLE_WHPX=OFF \
            -DAVM_ENABLE_OVERLAY=OFF
          cmake --build native/avm/build --parallel

      # ── AVM: codesign with Hypervisor entitlement BEFORE electron-builder
      #    wraps it — otherwise Hypervisor.framework is denied at runtime
      - name: Codesign AVM binary
        run: |
          codesign \
            --entitlements native/avm/avm.entitlements \
            --force \
            -s - \
            native/avm/build/avm

      - name: Install npm dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

      - name: Package app (macOS)
        run: npx electron-builder --mac dir --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # ── Sign the full .app passing AVM entitlements so the Hypervisor
      #    entitlement is preserved through the deep sign
      - name: Sign app (ad-hoc + Hypervisor entitlement)
        run: |
          codesign \
            --entitlements native/avm/avm.entitlements \
            --force \
            --deep \
            --sign - \
            "release/mac-arm64/nunu.app"

      - name: Create DMG
        run: |
          STAGING=$(mktemp -d)
          cp -r "release/mac-arm64/nunu.app" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create \
            -volname "nunu" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "release/nunu-${{ github.ref_name }}-arm64.dmg"
          rm -rf "$STAGING"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: nunu-mac
          path: release/nunu-${{ github.ref_name }}-arm64.dmg

  build-win:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── AVM: SDL2 via vcpkg static (avoids bundling DLLs separately)
      - name: Install SDL2 via vcpkg
        run: |
          vcpkg install sdl2:x64-windows-static sdl2-ttf:x64-windows-static
          vcpkg integrate install

      # ── AVM: configure + build
      - name: Build AVM (C++)
        run: |
          $toolchain = "$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake"
          cmake -B native/avm/build -S native/avm `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$toolchain" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DCMAKE_BUILD_TYPE=Release `
            -DAVM_ENABLE_WHPX=ON `
            -DAVM_ENABLE_HVF=OFF `
            -DAVM_ENABLE_KVM=OFF `
            -DAVM_ENABLE_OVERLAY=OFF
          cmake --build native/avm/build --config Release --parallel
          Copy-Item native/avm/build/Release/avm.exe native/avm/build/avm.exe

      - name: Install npm dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

      - name: Package (Windows)
        run: npx electron-builder --win --publish never

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: nunu-win
          path: release/*.exe

  release:
    name: Create Release
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: nunu-mac
          path: artifacts/mac

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: nunu-win
          path: artifacts/win

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: true
          body: |
            ## nunu ${{ github.ref_name }}

            Android gaming launcher for Mac and Windows — AVM emulator engine included, no separate install required.

            ### Download
            - **macOS (Apple Silicon)** — download the `.dmg`, open it and drag nunu to Applications
            - **Windows** — download the `.exe` installer and run it

            ### What's inside
            - AVM emulator engine (bundled — no separate download needed)
            - Android 14 with Google Play support
            - Game library with Play Store banners
            - Google account sign-in
            - Automatic update checking

            ### First run
            Install the Android system image if you haven't already:
            ```
            sdkmanager "system-images;android-34;google_apis_playstore;arm64-v8a"
            ```
            Install ADB: `brew install android-platform-tools` (Mac) or Android SDK Platform Tools (Windows)

            ### Notes
            - macOS: right-click → Open on first launch if Gatekeeper blocks it
            - Windows: click "More info → Run anyway" if SmartScreen appears
          files: |
            artifacts/mac/*.dmg
            artifacts/win/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
