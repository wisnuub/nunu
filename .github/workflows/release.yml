name: Release

on:
  push:
    tags:
      - 'alpha-v*'
      - 'v*'

jobs:
  build-mac:
    name: Build macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

      - name: Package app (macOS)
        run: npx electron-builder --mac dir --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Ad-hoc sign app
        run: codesign --force --deep --sign - "release/mac-arm64/nunu.app"

      - name: Create DMG
        run: |
          # Stage app + Applications alias so users can drag-to-install
          STAGING=$(mktemp -d)
          cp -r "release/mac-arm64/nunu.app" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create \
            -volname "nunu" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "release/nunu-0.0.4-arm64.dmg"
          rm -rf "$STAGING"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: nunu-mac
          path: release/nunu-0.0.4-arm64.dmg

  build-win:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

      - name: Package (Windows)
        run: npx electron-builder --win --publish never

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: nunu-win
          path: release/*.exe

  release:
    name: Create Release
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: nunu-mac
          path: artifacts/mac

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: nunu-win
          path: artifacts/win

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Alpha v0.0.4
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: true
          body: |
            ## nunu — Alpha v0.0.4 — Working Test Build

            This is a working test build with the AVM emulator integration active.
            Android games now boot and launch end-to-end from the nunu UI.

            ### What's new
            - **AVM emulator wired up** — pressing Play boots Android 14 (Google Play) via the Android SDK emulator
            - **Auto-detects** AVM binary and SDK system image — no manual config needed
            - **Game launch via ADB** — after Android boots, the game opens automatically
            - **Play Store banners** as game card backgrounds (fetched from Play Store)
            - **Launch state feedback** — button shows Starting → Booting → launches
            - **Landscape 1920×1080 @ 240 DPI** — correct resolution for gaming

            ### Setup required before Play works
            1. Install AVM: build from [github.com/wisnuub/AVM](https://github.com/wisnuub/AVM) and copy to `~/.nunu/avm-core/avm`
            2. Install Android image: `sdkmanager "system-images;android-34;google_apis_playstore;arm64-v8a"`
            3. Install ADB: `brew install android-platform-tools` (Mac) or Android SDK Platform Tools (Windows)

            ### Download
            - **macOS (Apple Silicon)** — `.dmg`, drag nunu to Applications
            - **Windows** — `.exe` installer

            ### Notes
            - macOS: right-click → Open on first launch if Gatekeeper blocks it
            - Windows: click "More info → Run anyway" if SmartScreen appears
          files: |
            artifacts/mac/*.dmg
            artifacts/win/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
