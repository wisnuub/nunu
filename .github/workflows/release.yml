name: Release

on:
  push:
    tags:
      - 'alpha-v*'
      - 'v*'

jobs:
  build-mac:
    name: Build macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install AVM build deps
        run: brew install cmake ninja sdl2 sdl2_ttf molten-vk

      - name: Build AVM (C++)
        run: |
          cmake -B native/avm/build -S native/avm -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DAVM_ENABLE_HVF=ON \
            -DAVM_ENABLE_MOLTENVK=ON \
            -DAVM_ENABLE_KVM=OFF \
            -DAVM_ENABLE_WHPX=OFF \
            -DAVM_ENABLE_OVERLAY=OFF
          cmake --build native/avm/build --parallel

      - name: Codesign AVM binary
        run: |
          codesign \
            --entitlements native/avm/avm.entitlements \
            --force \
            -s - \
            native/avm/build/avm

      - name: Write Google credentials
        run: |
          mkdir -p native/credentials
          echo '{"clientId":"${{ secrets.GOOGLE_CLIENT_ID }}","clientSecret":"${{ secrets.GOOGLE_CLIENT_SECRET }}"}' > native/credentials/google.json

      - name: Install npm dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

      - name: Package app (macOS)
        run: npx electron-builder --mac dir --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Sign app (ad-hoc + Hypervisor entitlement)
        run: |
          codesign \
            --entitlements native/avm/avm.entitlements \
            --force \
            --deep \
            --sign - \
            "release/mac-arm64/nunu.app"

      - name: Create DMG
        run: |
          STAGING=$(mktemp -d)
          cp -r "release/mac-arm64/nunu.app" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create \
            -volname "nunu" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "release/nunu-${{ github.ref_name }}-arm64.dmg"
          rm -rf "$STAGING"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: nunu-mac
          path: release/nunu-${{ github.ref_name }}-arm64.dmg

  build-win:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Write Google credentials
        run: |
          New-Item -ItemType Directory -Force -Path native\credentials
          '{"clientId":"${{ secrets.GOOGLE_CLIENT_ID }}","clientSecret":"${{ secrets.GOOGLE_CLIENT_SECRET }}"}' | Out-File -FilePath native\credentials\google.json -Encoding utf8

      - name: Install npm dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

      # Windows: package without bundled AVM (not yet tested on Windows)
      # Temporarily override electron-builder config to skip AVM extraResources
      - name: Package (Windows)
        run: |
          npx electron-builder --win --publish never --config.win.extraResources=[]
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: nunu-win
          path: release/*.exe

  release:
    name: Create Release
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: nunu-mac
          path: artifacts/mac

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: nunu-win
          path: artifacts/win

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: true
          body: |
            ## nunu ${{ github.ref_name }}

            ### Platform status
            | Platform | Status |
            |---|---|
            | macOS (Apple Silicon) | Launcher + nunu-apple engine install |
            | Windows | Launcher UI only — emulator coming soon |

            ### Download
            - **macOS (Apple Silicon)** — `.dmg`, drag nunu to Applications
            - **Windows** — `.exe` installer

            ### What's new (macOS)
            - **Settings → Engine**: install/update nunu-apple (NunuVM) engine from within the app
            - macOS path now uses Cuttlefish via nunu-apple engine (NunuVM) instead of AVM
            - Cursor fix: pointer stays visible when clicking inside the VM
            - Engine version tracking and update detection

            ### First run (macOS)
            1. Open nunu → Settings → Engine → Install
            2. nunu-apple engine downloads automatically
            3. Install Cuttlefish images and configure `~/.nunu/config.json`

            ### Notes
            - macOS: right-click → Open on first launch if Gatekeeper blocks it
            - Windows: click "More info → Run anyway" if SmartScreen appears
          files: |
            artifacts/mac/*.dmg
            artifacts/win/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
