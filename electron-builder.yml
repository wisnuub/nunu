appId: com.nunu.launcher
productName: nunu
directories:
  output: release
mac:
  target: dir
  icon: assets/icon.icns
  category: public.app-category.games
  extraResources:
    - from: native/avm/build/avm
      to: avm/avm
    - from: native/credentials/google.json
      to: credentials/google.json
win:
  target:
    - target: nsis
      arch: [x64]
  icon: assets/icon.ico
  extraResources:
    - from: native/credentials/google.json
      to: credentials/google.json
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: nunu
